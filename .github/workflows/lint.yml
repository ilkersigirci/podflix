name: Lint the module

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v6
      - name: Lint Dependency Installation
        uses: astral-sh/ruff-action@v3
        with:
          src: ./src/podflix
      - run: ruff format --check --diff
      - run: ruff check
